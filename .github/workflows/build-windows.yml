name: Build Windows EXE (Packager)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules
        run: npx electron-rebuild

      - name: Build Windows app
        run: npm run build:win

      # 👇 你要退回到的就是这一段
      - name: Copy ffmpeg.dll to exe dir
        run: |
          copy dist\SafePatrolAdmin-win32-x64\ffmpeg.dll dist\SafePatrolAdmin-win32-x64\

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: SafePatrolAdmin-Windows-EXE
          path: dist/SafePatrolAdmin-win32-x64/**